<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaF2 Saturation Index Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for a premium vivid look */
        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body { 
            background: linear-gradient(-45deg, #0284c7, #3b82f6, #6366f1, #8b5cf6);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glass-panel-dark {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .input-group { position: relative; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden grid grid-cols-1 md:grid-cols-2 border border-white/20">
        
        <!-- Input Section -->
        <div class="p-8 glass-panel">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
                Reactor Parameters
            </h2>
            
            <form id="calculatorForm" class="space-y-6">
                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-700">Raw Fluoride Concentration</label>
                        <div class="flex items-center text-blue-600 font-bold text-sm">
                            <input type="number" id="fRawNum" min="50" max="500" step="1" value="100" class="w-20 text-right bg-slate-50 border border-slate-300 rounded px-2 py-1 mr-1.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-800 transition-colors">
                            <span>mg/L</span>
                        </div>
                    </div>
                    <input type="range" id="fRaw" min="50" max="500" step="1" value="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-700">Hydraulic Retention Time (HRT)</label>
                        <div class="flex items-center text-blue-600 font-bold text-sm">
                            <input type="number" id="hrtNum" min="1" max="120" step="1" value="30" class="w-20 text-right bg-slate-50 border border-slate-300 rounded px-2 py-1 mr-1.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-800 transition-colors">
                            <span>min</span>
                        </div>
                    </div>
                    <input type="range" id="hrt" min="1" max="120" step="1" value="30" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-700">Upflow Velocity (V<sub>up</sub>)</label>
                        <div class="flex items-center text-blue-600 font-bold text-sm">
                            <input type="number" id="vUpNum" min="10" max="80" step="1" value="40" class="w-20 text-right bg-slate-50 border border-slate-300 rounded px-2 py-1 mr-1.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-800 transition-colors">
                            <span>m/hr</span>
                        </div>
                    </div>
                    <input type="range" id="vUp" min="10" max="80" step="1" value="40" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-700">Reactor Length (L)</label>
                        <div class="flex items-center text-blue-600 font-bold text-sm">
                            <input type="number" id="lengthNum" min="0.5" max="3.5" step="0.1" value="2.0" class="w-20 text-right bg-slate-50 border border-slate-300 rounded px-2 py-1 mr-1.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-800 transition-colors">
                            <span>m</span>
                        </div>
                    </div>
                    <input type="range" id="length" min="0.5" max="3.5" step="0.1" value="2.0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div class="input-group">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-700">Ca / F Molar Ratio</label>
                        <div class="flex items-center text-blue-600 font-bold text-sm">
                            <input type="number" id="caFRatioNum" min="0.4" max="2.5" step="0.01" value="1.0" class="w-20 text-right bg-slate-50 border border-slate-300 rounded px-2 py-1 mr-1.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-800 transition-colors">
                        </div>
                    </div>
                    <input type="range" id="caFRatio" min="0.4" max="2.5" step="0.01" value="1.0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </form>
        </div>

        <!-- Output Section -->
        <div class="p-8 glass-panel-dark text-white flex flex-col justify-center relative overflow-hidden">
            <!-- Decorative background orbs -->
            <div class="absolute top-0 right-0 -mt-16 -mr-16 w-64 h-64 bg-blue-500 rounded-full mix-blend-screen filter blur-[60px] opacity-30 animate-pulse"></div>
            <div class="absolute bottom-0 left-0 -mb-16 -ml-16 w-64 h-64 bg-purple-500 rounded-full mix-blend-screen filter blur-[60px] opacity-30 animate-pulse" style="animation-delay: 2s;"></div>
            
            <h2 class="text-2xl font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 relative z-10">Calculation Results</h2>
            
            <div class="space-y-6 relative z-10">
                <div id="siContainer" class="bg-slate-800/60 backdrop-blur-md p-6 rounded-2xl border border-slate-600/50 shadow-[0_8px_32px_rgba(0,0,0,0.3)] transition-all duration-500">
                    <p class="text-sm text-slate-400 font-medium uppercase tracking-wider mb-2">Saturation Index (SI)</p>
                    <p id="siOutput" class="text-5xl font-extrabold text-white tracking-tight transition-all duration-300">0.00</p>
                    <p id="siStatus" class="text-sm mt-3 font-medium uppercase tracking-wide transition-all duration-300"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/60 backdrop-blur-md p-4 rounded-xl border border-slate-600/50 hover:bg-slate-700/60 transition-colors">
                        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Quotient (Q)</p>
                        <p id="qOutput" class="text-lg font-bold text-blue-300">0.00</p>
                    </div>
                    <div class="bg-slate-800/60 backdrop-blur-md p-4 rounded-xl border border-slate-600/50 hover:bg-slate-700/60 transition-colors">
                        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Dilution Ratio</p>
                        <p id="dilutionOutput" class="text-lg font-bold text-purple-300">0.00</p>
                    </div>
                </div>

                <div class="pt-5 border-t border-slate-700/50">
                    <p class="text-xs text-slate-400 mb-3 uppercase tracking-wider font-medium">System Concentrations</p>
                    <div class="space-y-3">
                        <!-- Initial -->
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center text-sm bg-slate-900/40 p-3 rounded-lg border border-slate-700/30 gap-2">
                            <span class="text-slate-400 text-xs uppercase font-semibold">Initial (Pre-reaction)</span>
                            <div class="flex gap-4">
                                <span class="text-slate-300 font-medium">[F]: <span id="fReactorOutput" class="font-mono text-blue-400">0.00</span> M</span>
                                <span class="text-slate-300 font-medium">[Ca]: <span id="caReactorOutput" class="font-mono text-purple-400">0.00</span> M</span>
                            </div>
                        </div>
                        
                        <!-- Residual -->
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center text-sm bg-slate-900/60 p-3 rounded-lg border border-slate-700/50 shadow-inner gap-2">
                            <span class="text-emerald-400/80 text-xs uppercase font-bold">Residual (Equilibrium)</span>
                            <div class="flex gap-4 flex-wrap">
                                <span class="text-slate-300 font-medium">[F]: <span id="fResidualOutput" class="font-mono text-blue-400">0.00</span> mg/L</span>
                                <span class="text-slate-300 font-medium">[Ca]: <span id="caResidualOutput" class="font-mono text-purple-400">0.00</span> mg/L</span>
                                <span class="text-slate-300 font-medium" title="Ca Hardness as CaCO3">Hardness: <span id="hardnessOutput" class="font-mono text-amber-400">0</span> mg/L</span>
                                <span class="text-slate-300 font-medium" title="Assuming CaCl2 dosing">[Cl⁻]: <span id="clOutput" class="font-mono text-slate-400">0.00</span> mg/L</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Constants
        const KSP_CAF2 = 3.9e-11;
        const MW_FLUORIDE = 18.9984; // g/mol
        const MW_CALCIUM = 40.078; // g/mol
        const MW_CACO3 = 100.0869; // g/mol
        const MW_CHLORIDE = 35.45; // g/mol

        const outputs = {
            siContainer: document.getElementById('siContainer'),
            si: document.getElementById('siOutput'),
            status: document.getElementById('siStatus'),
            q: document.getElementById('qOutput'),
            dilution: document.getElementById('dilutionOutput'),
            fReactor: document.getElementById('fReactorOutput'),
            caReactor: document.getElementById('caReactorOutput'),
            fResidual: document.getElementById('fResidualOutput'),
            caResidual: document.getElementById('caResidualOutput'),
            hardness: document.getElementById('hardnessOutput'),
            cl: document.getElementById('clOutput')
        };

        function calculate() {
            // Get values from number inputs
            const fRawMgL = parseFloat(document.getElementById('fRawNum').value);
            const hrtMin = parseFloat(document.getElementById('hrtNum').value);
            const vUpMHr = parseFloat(document.getElementById('vUpNum').value);
            const lengthM = parseFloat(document.getElementById('lengthNum').value);
            const caFRatio = parseFloat(document.getElementById('caFRatioNum').value);

            // Validate inputs
            if (isNaN(fRawMgL) || isNaN(hrtMin) || isNaN(vUpMHr) || isNaN(lengthM) || isNaN(caFRatio)) {
                return; // Wait for valid input
            }

            // 1. Convert Raw F from mg/L to Molarity (mol/L)
            const fRawMolar = fRawMgL / (MW_FLUORIDE * 1000);

            // 2. Calculate Dilution Ratio (converting HRT min to hours)
            const hrtHr = hrtMin / 60.0;
            const dilutionRatio = (hrtHr * vUpMHr) / lengthM;

            if (dilutionRatio <= 0) return;

            // 3. Calculate Initial Reactor Concentrations
            const fReactorMolar = fRawMolar / dilutionRatio;
            const caReactorMolar = fReactorMolar * caFRatio;
            
            // Cl- concentration (Assuming standard CaCl2 dosing)
            const clMolar = caReactorMolar * 2;

            // 4. Calculate Quotient (Q)
            const q = caReactorMolar * Math.pow(fReactorMolar, 2);

            // 5. Calculate Saturation Index (SI)
            const si = Math.log10(q / KSP_CAF2);

            // 6. Calculate Equilibrium Residual Concentrations (Bisection Method)
            let residualCa = caReactorMolar;
            let residualF = fReactorMolar;

            if (q > KSP_CAF2) {
                // Precipitation occurs, find 'x' moles of CaF2 precipitated
                let low = 0;
                let high = Math.min(caReactorMolar, fReactorMolar / 2);
                
                // 60 iterations provides extreme precision for this range
                for (let i = 0; i < 60; i++) {
                    let mid = (low + high) / 2;
                    let currentQ = (caReactorMolar - mid) * Math.pow(fReactorMolar - 2 * mid, 2);
                    if (currentQ > KSP_CAF2) {
                        low = mid; // Need to precipitate more
                    } else {
                        high = mid; // Precipitated too much
                    }
                }
                
                let x = (low + high) / 2;
                residualCa = Math.max(0, caReactorMolar - x);
                residualF = Math.max(0, fReactorMolar - 2 * x);
            }

            // 7. Convert Residuals to mg/L & Calculate Hardness
            const residualF_mgL = residualF * MW_FLUORIDE * 1000;
            const residualCa_mgL = residualCa * MW_CALCIUM * 1000;
            const hardness_mgL_CaCO3 = residualCa * MW_CACO3 * 1000; // Hardness as mg/L CaCO3
            const cl_mgL = clMolar * MW_CHLORIDE * 1000;

            // Update UI
            outputs.dilution.innerText = dilutionRatio.toFixed(2);
            outputs.q.innerText = q.toExponential(2);
            
            outputs.fReactor.innerText = fReactorMolar.toExponential(2);
            outputs.caReactor.innerText = caReactorMolar.toExponential(2);
            
            outputs.fResidual.innerText = residualF_mgL.toFixed(2);
            outputs.caResidual.innerText = residualCa_mgL.toFixed(2);
            outputs.hardness.innerText = hardness_mgL_CaCO3.toFixed(0);
            outputs.cl.innerText = cl_mgL.toFixed(2);
            
            outputs.si.innerText = si.toFixed(3);

            // Interpret SI Status based on target range [2.0, 3.0]
            if (si >= 2 && si <= 3) {
                // Optimal Range
                outputs.status.innerText = "Optimal Range (Good crystallization)";
                outputs.status.className = "text-sm mt-3 font-bold text-emerald-400 drop-shadow-[0_0_10px_rgba(52,211,153,0.8)]";
                outputs.si.style.textShadow = "0 0 24px rgba(52,211,153,0.5)";
                outputs.si.style.color = "#a7f3d0"; 
                outputs.siContainer.className = "backdrop-blur-md p-6 rounded-2xl transition-all duration-500 bg-slate-800/60 border-2 border-emerald-500/50 shadow-[0_0_30px_rgba(52,211,153,0.2)]";
                outputs.si.classList.remove('animate-pulse');
            } else if (si > 3) {
                // Too High
                outputs.status.innerText = "Too High (Risk of Fine Particles)";
                outputs.status.className = "text-sm mt-3 font-bold text-rose-400 drop-shadow-[0_0_10px_rgba(251,113,133,1)]";
                outputs.si.style.textShadow = "0 0 30px rgba(251,113,133,0.9)";
                outputs.si.style.color = "#ffe4e6"; 
                outputs.siContainer.className = "backdrop-blur-md p-6 rounded-2xl transition-all duration-500 bg-rose-900/40 border-2 border-rose-500 shadow-[0_0_50px_rgba(251,113,133,0.5)] animate-pulse";
                outputs.si.classList.add('animate-pulse');
            } else {
                // Too Low (< 2)
                const text = si > 0 ? "Too Low (low F removal)" : "Undersaturated (Dissolution)";
                outputs.status.innerText = text;
                outputs.status.className = "text-sm mt-3 font-bold text-amber-400 drop-shadow-[0_0_10px_rgba(251,191,36,1)]";
                outputs.si.style.textShadow = "0 0 30px rgba(251,191,36,0.9)";
                outputs.si.style.color = "#fef3c7"; 
                outputs.siContainer.className = "backdrop-blur-md p-6 rounded-2xl transition-all duration-500 bg-amber-900/40 border-2 border-amber-500 shadow-[0_0_50px_rgba(251,191,36,0.5)] animate-pulse";
                outputs.si.classList.add('animate-pulse');
            }
        }

        // Two-way binding for sliders and number inputs
        const params = ['fRaw', 'hrt', 'vUp', 'length', 'caFRatio'];
        
        params.forEach(param => {
            const slider = document.getElementById(param);
            const numInput = document.getElementById(param + 'Num');

            // Sync Slider -> Num Input
            slider.addEventListener('input', (e) => {
                numInput.value = e.target.value;
                calculate();
            });

            // Sync Num Input -> Slider
            numInput.addEventListener('input', (e) => {
                slider.value = e.target.value;
                calculate();
            });
        });

        // Initial calculation on load
        calculate();
    </script>
</body>
</html>
